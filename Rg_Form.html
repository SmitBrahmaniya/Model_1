<!doctype html>
<html>
  <head>
    <title>Registration Form</title>

    <style>
      body {
        background: #b7ff66;
        font-family: Times New Roman;
      }

      .main {
        width: 800px;
        margin: auto;
        margin-top: 30px;
        border: 3px solid green;
        background: #99ff66;
      }

      h1 {
        text-align: center;
        color: darkgreen;
        padding: 15px;
        margin: 0;
        font-size: 40px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      td {
        border: 2px solid green;
        padding: 8px;
        font-size: 20px;
      }

      .label {
        width: 35%;
        text-align: center;
        font-weight: bold;
      }

      input,
      textarea,
      select {
        width: 95%;
        padding: 5px;
        font-size: 16px;
      }

      textarea {
        height: 80px;
      }

      .btn {
        width: auto;
        padding: 5px 15px;
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <div class="main">
      <h1>Registration Form</h1>

      <form>
        <table>
          <tr>
            <td class="label">First Name :</td>
            <td>
              <input type="text" placeholder="Enter First Name" required />
            </td>
          </tr>

          <tr>
            <td class="label">Last Name :</td>
            <td>
              <input type="text" placeholder="Enter Last Name" required />
            </td>
          </tr>

          <tr>
            <td class="label">Contact no. :</td>
            <td>
              <input type="tel" placeholder="Enter Contact Number" required />
            </td>
          </tr>

          <tr>
            <td class="label">Landline no. :</td>
            <td>
              <input type="text" placeholder="Enter Your Landline no" />
            </td>
          </tr>

          <tr>
            <td class="label">Email :</td>
            <td>
              <input type="email" placeholder="Enter Your Email ID" required />
            </td>
          </tr>

          <tr>
            <td class="label">Password :</td>
            <td>
              <input
                type="password"
                placeholder="Enter a New Password"
                required
              />
            </td>
          </tr>

          <tr>
            <td class="label">Date of Birth</td>
            <td>
              <input type="date" />
            </td>
          </tr>

          <tr>
            <td class="label">Age</td>
            <td>
              <input type="number" placeholder="Enter Age" />
            </td>
          </tr>

          <tr>
            <td class="label">Gender</td>
            <td>
              Male <input type="radio" name="g" /> Female
              <input type="radio" name="g" />
            </td>
          </tr>

          <tr>
            <td class="label">Address</td>
            <td>
              <textarea></textarea>
            </td>
          </tr>

          <tr>
            <td class="label">City</td>
            <td>
              <select>
                <option>Select City</option>
                <option>Ahmedabad</option>
                <option>Surat</option>
                <option>Rajkot</option>
                <option>Vadodara</option>
              </select>
            </td>
          </tr>

          <tr>
            <td class="label">Pincode</td>
            <td>
              <input type="text" />
            </td>
          </tr>

          <tr>
            <td class="label">Joining Date</td>
            <td>
              <input type="date" />
            </td>
          </tr>

          <tr>
            <td class="label">Confirm Your Form</td>
            <td>
              <input type="submit" value="Submit" class="btn" />
              <input type="reset" value="Reset" class="btn" />
            </td>
          </tr>
        </table>
      </form>
    </div>
  </body>
</html>
