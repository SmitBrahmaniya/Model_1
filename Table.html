<!DOCTYPE html>
<html>
<head>
    <title>Irregular Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 700px;
            text-align: center;
        }
        td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <td colspan="2">A</td>
        <td colspan="5">B</td>
    </tr>

    <tr>
        <td>C</td>
        <td>D</td>
        <td>E</td>
        <td>F</td>
        <td>G</td>
        <td colspan="2">J</td>
    </tr>

    <tr>
        <td>K</td>
        <td>M</td>
        <td colspan="2">N</td>
        <td>I</td>
        <td colspan="2"></td>
    </tr>

    <tr>
        <td></td>
        <td>L</td>
        <td>P</td>
        <td>O</td>
        <td>I</td>
        <td>H</td>
        <td></td>
    </tr>
</table>

</body>
</html>
