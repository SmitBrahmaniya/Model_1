<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Watches | Shop All</title>
    <link rel="stylesheet" href="cat.css">
</head>
<body>

    <header class="category-header">
        <h1>Premium Timepieces</h1>
        <p>Discover our curated collection of luxury watches.</p>
    </header>

    <main class="product-grid">

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314?auto=format&fit=crop&w=500&q=80" alt="Watch 1">
            <h3>Classic Wear</h3>
            <p class="price">
                <span style="text-decoration: line-through; color: #888; margin-right: 10px;">₹2599/-</span>
                <span style="color: #e67e22; font-weight: bold;">₹1999/-</span>
            </p>
            <button class="buy-btn">Add to Cart</button>
        </div>  

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?auto=format&fit=crop&w=500&q=80" alt="Watch 2">
            <h3>Luxurious Leather</h3>
            <p class="price">₹1399/-</p>
            <button class="buy-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1522312346375-d1a52e2b99b3?auto=format&fit=crop&w=500&q=80" alt="Watch 3">
            <h3>Silver Executive</h3>
            <p class="price">₹2999/-</p>
            <button class="buy-btn">Add to Cart</button>
        </div>
    </main>

</body>
</html>
