<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Registration</title>
    <!-- Link to your external CSS file here -->
    <link rel="stylesheet" href="Style.css"> 
</head>
<body>

    <div class="login-container"> <!-- Using the same container class for consistency -->
        <form class="login-form">
            <h2>Create Account</h2>
            <p>Join us today! It only takes a minute.</p>
            
            <div class="d1">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="Please enter your full name" required>
            </div>

            <div class="d1">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="abcd@example.com" required>
            </div>

            <div class="d1">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>

            <div class="d1">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Re-Enter your password" required>
            </div>


            <button type="submit" class="bt">Register Now</button>
            
            <p class="signup-link">Already have an account? <a href="login.html">Log In</a></p>
        </form>
    </div>

</body>
</html>
