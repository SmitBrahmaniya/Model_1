<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <style>
        .d1{
            height: 100px;
            width: 200px;
            border: 5px;
            border-radius: 20%;
            display: inline;
            margin: 10px;
            padding: 10px;
            justify-content: center;
        }
        input{
            margin: 10px;
        }
        
    </style>
</head>

<body>
    <div class="d1">
        <div>
        <label>Username: </label>
        <input type="text" >
        </div>
        
        <div>
            <label>Password: </label>
            <input type="password" >
        </div>

        <div>
            <label>Email: </label>
            <input type="email" >
        </div>

        <div>
            <input type="submit" name="Submit">
        </div>
    </div>
</body>
</html>
